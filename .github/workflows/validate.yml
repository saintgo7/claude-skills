name: Validate skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Atomic commit check
        if: github.event_name == 'pull_request'
        run: |
          # PR base..HEAD diffмЧРмДЬ мГИ SKILL.md vs install.sh REGISTRY мґФк∞А мЭЉмєШ нЩХмЭЄ
          # (case CI transient failure нЪМнФЉ: м§Ск∞Д commit мЛЬм†Р mismatch л∞©мІА)
          set -e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          NEW=$(git diff --name-only --diff-filter=A "$BASE_SHA"...HEAD \
            | grep -E "^[^/]+/SKILL\.md$" \
            | xargs -I {} dirname {} || true)

          errors=0
          for skill in $NEW; do
            if ! git diff "$BASE_SHA"...HEAD install.sh 2>/dev/null | grep -qE "^\+\s*\"$skill\|"; then
              echo "вЭМ '$skill/' лФФл†ЙнЖ†л¶ђ мґФк∞АлРРмІАлІМ install.sh REGISTRYмЧР лИДлЭљ"
              errors=$((errors+1))
            fi
          done

          if [ "$errors" -eq 0 ]; then
            echo "вЬЕ Atomic commit check passed"
          else
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate SKILL.md frontmatter
        run: |
          python3 << 'EOF'
          import yaml
          import sys
          from pathlib import Path

          errors = []
          skill_count = 0

          for skill_md in sorted(Path('.').glob('*/SKILL.md')):
              skill_count += 1
              text = skill_md.read_text()

              if not text.startswith('---'):
                  errors.append(f"{skill_md}: missing YAML frontmatter")
                  continue

              end = text.find('---', 3)
              if end < 0:
                  errors.append(f"{skill_md}: unclosed YAML frontmatter")
                  continue

              try:
                  fm = yaml.safe_load(text[3:end])
              except yaml.YAMLError as e:
                  errors.append(f"{skill_md}: YAML parse error: {str(e)[:100]}")
                  continue

              if not isinstance(fm, dict):
                  errors.append(f"{skill_md}: frontmatter must be a mapping")
                  continue

              name = fm.get('name', '')
              desc = fm.get('description', '')

              if not name:
                  errors.append(f"{skill_md}: missing 'name'")
              if not desc:
                  errors.append(f"{skill_md}: missing 'description'")
              if len(desc) > 1024:
                  errors.append(f"{skill_md}: description too long ({len(desc)} > 1024)")
              if len(name) > 64:
                  errors.append(f"{skill_md}: name too long ({len(name)} > 64)")

              dir_name = skill_md.parent.name
              if name and name != dir_name:
                  errors.append(f"{skill_md}: name '{name}' != directory '{dir_name}'")

          if errors:
              print(f"вЭМ {len(errors)} errors in {skill_count} skills:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          else:
              print(f"вЬЕ All {skill_count} skills validated")
          EOF

      - name: Validate install.sh REGISTRY
        run: |
          # install.sh REGISTRYмЩА лФФл†ЙнЖ†л¶ђ м°імЮђ мЭЉмєШ нЩХмЭЄ
          bash << 'EOF'
          set -e

          # REGISTRY мґФмґЬ
          mapfile -t entries < <(grep -E '^\s*"[^"]+\|' install.sh | sed 's/^\s*"//; s/".*$//')

          errors=0
          for entry in "${entries[@]}"; do
            name=$(echo "$entry" | cut -d'|' -f1)
            type=$(echo "$entry" | cut -d'|' -f2)

            if [ "$type" = "skill" ]; then
              if [ ! -d "$name" ] || [ ! -f "$name/SKILL.md" ]; then
                echo "вЭМ Skill '$name' missing directory or SKILL.md"
                errors=$((errors+1))
              fi
            elif [ "$type" = "command" ]; then
              if [ ! -f "commands/${name}.md" ]; then
                echo "вЭМ Command '$name' missing commands/${name}.md"
                errors=$((errors+1))
              fi
            fi
          done

          if [ "$errors" -eq 0 ]; then
            echo "вЬЕ All ${#entries[@]} REGISTRY entries valid"
          else
            exit 1
          fi
          EOF

      - name: Bash syntax check
        run: |
          bash -n install.sh
          for sh in $(find . -name "*.sh" -not -path "./.git/*"); do
            bash -n "$sh" || { echo "вЭМ Syntax error in $sh"; exit 1; }
          done
          echo "вЬЕ All shell scripts syntactically valid"
